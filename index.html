<!doctype html>
  <html lang="zh-CN">
  <head>

  <style>
    body {

      color: #1f2937;
      background: #f6f8fb;
    }

    header {
      background: #0f172a;

      padding: 56px 24px;

      color: #cbd5e1;
    }

    main {

      margin: 32px auto;
      padding: 0 24px;
    }

    section {

      margin-bottom: 24px;
      padding: 28px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
    }

      margin-top: 0;

    }

    ul {
      padding-left: 22px;

        padding: 40px 20px;
      }

  <body>

    <main>
      <section>

          <li>交通事故</li>
